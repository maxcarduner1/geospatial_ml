bundle:
  name: ml-geospatial

variables:
  catalog:
    default: cmegdemos_catalog
  schema:
    default: geospatial_analytics

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://fevm-cmegdemos.cloud.databricks.com
      profile: fevm-cmegdemos

resources:
  jobs:
    ml_geospatial_pipeline:
      name: "[ML Geospatial] Signal Strength Prediction Pipeline"
      description: "Feature engineering → LightGBM training → batch scoring for H3 cell signal strength prediction"
      tags:
        team: tmo
        domain: ml-geospatial

      environments:
        - environment_key: ml_serverless
          spec:
            client: "5"
            dependencies:
              - lightgbm>=4.0.0
              - mlflow>=2.10.0
              - pandas>=2.0.0
              - numpy>=1.24.0
              - scikit-learn>=1.3.0
              - databricks-sdk>=0.30.0

      tasks:
        - task_key: feature_engineering
          description: "Build training features from signal_points + synthesized cell towers"
          environment_key: ml_serverless
          notebook_task:
            notebook_path: ./notebooks/01_feature_engineering.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"

        - task_key: train_model
          description: "Train LightGBM regressor, log to MLflow, register to Unity Catalog"
          depends_on:
            - task_key: feature_engineering
          environment_key: ml_serverless
          notebook_task:
            notebook_path: ./notebooks/02_train_model.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"

        - task_key: batch_scoring
          description: "Score holdout set with Champion model, persist predictions"
          depends_on:
            - task_key: train_model
          environment_key: ml_serverless
          notebook_task:
            notebook_path: ./notebooks/03_batch_scoring.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
